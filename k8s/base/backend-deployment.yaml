apiVersion: apps/v1
kind: Deployment
metadata:
  name: trippy-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trippy-backend
  template:
    metadata:
      labels:
        app: trippy-backend
    spec:
      containers:
        - name: trippy-backend
          image: ghcr.io/homelab1025/trippy-planner-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: trippy-secret
                  key: db.username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trippy-secret
                  key: db.password
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: trippy-secret
                  key: db.host
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: trippy-secret
                  key: db.port
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: trippy-secret
                  key: db.name
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://$(DB_HOST):$(DB_PORT)/$(DB_NAME)"
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: trippy-secret
                  key: resend.api_key
            - name: APP_BASE_URL
              value: "https://trippy.lab.wicked"
            - name: SESSION_EXPIRY_MINUTES
              value: "43200"
